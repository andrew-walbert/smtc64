<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Summit Club 64 logo</title>
  <desc id="desc">A refined Summit Club 64 shield badge with mountain summit, star, and text.</desc>
  <rect width="1024" height="1024" fill="#7fb8cf"/>

  <defs>
    <filter id="softEdge" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#082235" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g filter="url(#softEdge)">
    <polygon
      points="512,164 758,334 758,652 512,858 266,652 266,334"
      fill="#071f31"
      stroke="#d9eef3"
      stroke-width="10"
      stroke-linejoin="round"/>
    <polygon
      points="512,181 741,342 741,644 512,835 283,644 283,342"
      fill="none"
      stroke="#86c2d9"
      stroke-width="5"
      stroke-linejoin="round"
      opacity="0.95"/>
  </g>

  <!-- Snow/star signal -->
  <g transform="translate(512 290)">
    <path
      d="M0,-63 L15,-18 L61,-37 L33,0 L61,37 L15,18 L0,63 L-15,18 L-61,37 L-33,0 L-61,-37 L-15,-18 Z"
      fill="#f8f4e6"
      stroke="#86c2d9"
      stroke-width="9"
      stroke-linejoin="miter"/>
    <path
      d="M0,-38 L9,-10 L38,-22 L20,0 L38,22 L9,10 L0,38 L-9,10 L-38,22 L-20,0 L-38,-22 L-9,-10 Z"
      fill="#ffffff"
      opacity="0.85"/>
  </g>

  <!-- Summit geometry -->
  <g transform="translate(0 -8)">
    <polygon points="335,488 437,365 523,488" fill="#86c2d9"/>
    <polygon points="365,488 435,401 417,488" fill="#f6f0df" opacity="0.95"/>
    <polygon points="418,488 469,441 548,488" fill="#f6f0df"/>

    <polygon points="504,488 591,336 696,488" fill="#86c2d9"/>
    <polygon points="504,488 591,336 620,391 548,488" fill="#f8f4e6"/>
    <polygon points="558,421 600,365 579,414" fill="#ffffff"/>
    <polygon points="568,420 632,387 590,435" fill="#ffffff"/>
    <polygon points="620,488 653,447 696,488" fill="#f8f4e6"/>
  </g>

  <!-- Wordmark -->
  <g text-anchor="middle" font-family="Arial Black, Montserrat, Avenir Next, Helvetica, Arial, sans-serif">
    <text
      x="512"
      y="581"
      fill="#ffffff"
      font-size="76"
      font-weight="900"
      letter-spacing="10">SUMMIT</text>
    <text
      x="512"
      y="646"
      fill="#86c2d9"
      font-size="45"
      font-weight="900"
      letter-spacing="13">CLUB</text>
    <text
      x="512"
      y="751"
      fill="#f8f4e6"
      font-size="112"
      font-weight="900"
      letter-spacing="2">64</text>
  </g>
</svg>
